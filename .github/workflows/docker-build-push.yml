name: Docker build & Push                   #Name of the workflow
on:
    push:
        branches: [main]                   #Workflow will run when there is a push on main branch

jobs:
    build-and-push:                          #Job Name
        runs-on: ubuntu-latest               #Use GitHub hosted Ubuntu runner (VM)

        steps:
            - name: code checkout                
              uses: actions/checkout@v4          #Doenload the repository code to the runner machine

            - name: Login to dockerhub           #Login to Docker Hub using credentials stored in GitHub Secrets
              uses: docker/login-action/@v3      
              with:
                username: ${{vars.DOCKERHUB_USER}}           #Username stored in GitHub Secrets and variables
                password: ${{secrets.DOCKERHUB_TOKEN}}       #Token stored in GitHub Secrets

            - name: build and push docker image
              uses: docker/build-push-action@v6              #Build and push Docker image using the Dockerfile in the repository
              with:
                context: .                          #Use the current directory as the build context for the Docker image
                push: true                          #Push the built image to Docker Hub after building
                tags: |                             #Tag the Docker image with multiple tags: branch name, commit SHA, and 'latest'
                    ${{vars.DOCKERHUB_USER}}/github-actions:${{ github.ref_name }}     
                    ${{vars.DOCKERHUB_USER}}/github-actions:${{github.sha}}
                    ${{vars.DOCKERHUB_USER}}/github-actions:latest
