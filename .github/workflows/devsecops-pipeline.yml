name: End To End Devsecops Pipeline 
on:
    workflow_dispatch:

jobs:
    #CI(Continuous integration) with security checks and quality gates
    code-quality:
        uses: ./.github/workflows/code-quality.yml

    secret-scan:
        uses: ./.github/workflows/secrets-scan.yml

    dependency-scan:
        uses: ./.github/workflows/dependency-scan.yml

    docker-scan:
        uses: ./.github/workflows/docker-linting.yml

#Build once the security scan and tests are successful
    build:
        needs: [code-quality, secret-scan, dependency-scan, docker-scan]
        uses: ./.github/workflows/docker-build-push.yml
        secrets: inherit

#Image Scan
    trivy:
        needs: [build]
        uses: ./.github/workflows/image-scan.yml
        secrets: inherit


#CD: Deploy to production if the image scan is successful
    deploy:
        needs: [trivy]
        uses: ./.github/workflows/deploy-to-server.yml
        secrets: inherit