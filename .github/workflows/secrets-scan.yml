#run a secret scan for API keys, sensitive data, credential leaks, and other secrets in the codebase
name: Secrets Scan

on: 
    workflow_call:

jobs:
    secret-scan:
        runs-on: ubuntu-latest
        steps:
            - name: checkout code
              uses: actions/checkout@v4
              with:
                fetch-depth: 0

            - name: Run gitleaks scanner
              uses: gitleaks/gitleaks-action@v2
              env:
                GITHUB_TOKEN: ${{secrets.GITHUB_TOKEN}}   #Github Actions Manages it
                

