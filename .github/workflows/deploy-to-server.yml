#Deploy the safe secured and tested app to prod server using ssh Action
name: Deploy to Server
on:
    workflow_call:

jobs:
    deploy:
        runs-on: ubunyu-latest
        steps:
            - name: SSH to Prod Server
              uses: appleboy/ssh-action@v1.0.3
              with:
                host: ${{secrets.EC2_SSH_HOST}}
                username: ${{secrets.EC2_SSH_USER}}
                key: ${{secrets.EC2_SSH_PRIVATE_KEY}}
                script: |
                  echo "Testing whether server is able to ssh server or not"
                  mkdir -p devops